<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Embalei · Estação de Embalagem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f6f7;
    --panel: #ffffff;
    --ink: #11181c;
    --ink-2: #51565d;
    --ink-3: #889096;
    --line: #e6e7eb;
    --line-2: #eef0f3;
    --brand: #006fee;
    --brand-50: #e6f1fe;
    --success: #17c964;
    --success-50: #e8faf0;
    --warn: #f5a524;
    --warn-50: #fef4e4;
    --danger: #f31260;
    --danger-50: #fee7ef;
    --cold: #0ea5e9;
    --cold-50: #e0f4fd;
    --shadow: 0 1px 2px rgba(17,24,28,.04), 0 6px 20px rgba(17,24,28,.06);
    --shadow-lg: 0 12px 40px rgba(17,24,28,.10);
    --r-sm: 8px;
    --r: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button { font-family: inherit; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* ===== Top bar ===== */
  .topbar {
    height: 64px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 18px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: -0.02em; font-size: 18px;
  }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #0a5cd1, #006fee 60%, #38bdf8);
    display: grid; place-items: center; color: white; font-weight: 800;
    box-shadow: 0 4px 10px rgba(0,111,238,.35);
  }
  .crumbs {
    display: flex; align-items: center; gap: 8px;
    color: var(--ink-3); font-size: 13px;
  }
  .crumbs .sep { opacity: .5; }
  .crumbs .cur { color: var(--ink-2); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .station {
    display: flex; align-items: center; gap: 10px;
    background: var(--line-2);
    border-radius: 999px;
    padding: 6px 12px 6px 8px;
    font-size: 13px; color: var(--ink-2);
  }
  .station .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 0 4px rgba(23,201,100,.18);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    border: 0; cursor: pointer;
    padding: 9px 14px; border-radius: 10px;
    font-weight: 600; font-size: 13px;
    transition: transform .08s ease, background .12s ease, box-shadow .12s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--line-2); }
  .btn.danger {
    background: var(--danger); color: white;
    box-shadow: 0 4px 12px rgba(243,18,96,.25);
  }
  .btn.danger:hover { background: #d80f55; }
  .btn.primary {
    background: var(--ink); color: white;
  }
  .btn.primary:hover { background: #000; }

  /* ===== Layout ===== */
  .stage {
    max-width: 1480px;
    margin: 0 auto;
    padding: 24px 28px 64px;
  }

  /* ===== Scan strip ===== */
  .scan-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 22px;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .scanner-illus {
    height: 150px;
    border-radius: var(--r);
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,.6), transparent 60%),
      linear-gradient(180deg, #1f242b 0%, #0d1015 100%);
    position: relative;
    overflow: hidden;
    display: grid; place-items: center;
  }
  .scanner-label {
    position: absolute; top: 8px; left: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; color: rgba(255,255,255,.5);
  }

  /* Variant A — Presentation scanner (current) */
  .scanner-illus.va .scanner-window {
    width: 70%; height: 56%;
    border-radius: 10px;
    background: radial-gradient(60% 80% at 50% 50%, #ff2a2a 0%, #780000 70%, #2a0000 100%);
    position: relative;
    box-shadow: inset 0 0 30px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.04);
  }
  .scanner-illus.va .scanner-window::before {
    content: "";
    position: absolute; left: 0; right: 0; top: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,200,200,.85), transparent);
    box-shadow: 0 0 14px rgba(255,80,80,.7);
    animation: scan 2.2s ease-in-out infinite;
  }
  @keyframes scan {
    0%, 100% { transform: translateY(-26px); opacity: .3; }
    50% { transform: translateY(26px); opacity: 1; }
  }

  /* Variant B — Handheld pistol-grip */
  .scanner-illus.vb { background:
      radial-gradient(120% 80% at 80% 100%, rgba(255,255,255,.05), transparent 60%),
      linear-gradient(180deg, #20262e 0%, #0d1015 100%);
  }
  .scanner-illus.vb .gun {
    width: 78%; height: 70%; position: relative;
  }
  .scanner-illus.vb .gun-head {
    position: absolute; left: 0; top: 12%;
    width: 62%; height: 50%;
    background: linear-gradient(180deg, #3a4049, #1a1d22);
    border-radius: 10px 16px 14px 4px;
    box-shadow: inset 0 -8px 12px rgba(0,0,0,.4), 0 6px 14px rgba(0,0,0,.5);
  }
  .scanner-illus.vb .gun-head::before {
    content: ""; position: absolute;
    right: 10%; top: 28%; bottom: 28%;
    width: 28%;
    background: radial-gradient(60% 80% at 60% 50%, #ff2020 0%, #5a0000 80%);
    border-radius: 4px;
    box-shadow: inset 0 0 12px rgba(0,0,0,.6);
  }
  .scanner-illus.vb .gun-head::after {
    content: ""; position: absolute;
    left: 8%; top: 18%;
    width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 10px #22c55e;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .scanner-illus.vb .grip {
    position: absolute; left: 12%; top: 55%;
    width: 22%; height: 45%;
    background: linear-gradient(180deg, #2a2f36, #14171b);
    border-radius: 4px 4px 10px 10px;
    transform: rotate(-12deg);
    transform-origin: top left;
    box-shadow: 0 6px 14px rgba(0,0,0,.5);
  }
  .scanner-illus.vb .beam {
    position: absolute; right: 0; top: 30%;
    width: 38%; height: 14%;
    background: linear-gradient(90deg, rgba(255,40,40,0), rgba(255,80,80,.6));
    transform-origin: left center;
    animation: beamPulse 1.6s ease-in-out infinite;
  }
  @keyframes beamPulse {
    0%, 100% { opacity: .3; transform: scaleX(.6); }
    50% { opacity: 1; transform: scaleX(1); }
  }
  .scanner-illus.vb .barcode {
    position: absolute; right: -2%; top: 12%;
    width: 22%; height: 56%;
    background:
      repeating-linear-gradient(90deg, #fff 0 2px, transparent 2px 4px, #fff 4px 7px, transparent 7px 9px, #fff 9px 12px, transparent 12px 14px);
    opacity: .85;
    border-radius: 2px;
  }

  /* Variant C — Top-down laser sweep on box */
  .scanner-illus.vc { background:
      radial-gradient(120% 80% at 50% 100%, rgba(0,111,238,.10), transparent 70%),
      linear-gradient(180deg, #0e131a 0%, #0a0c10 100%);
  }
  .scanner-illus.vc .laser-bar {
    position: absolute; top: 8%;
    left: 8%; right: 8%; height: 16%;
    background: linear-gradient(180deg, #2a2f36, #14171b);
    border-radius: 4px;
    box-shadow: 0 4px 8px rgba(0,0,0,.5);
  }
  .scanner-illus.vc .laser-bar::after {
    content: ""; position: absolute;
    left: 50%; top: 100%; transform: translateX(-50%);
    width: 8px; height: 8px;
    background: #ef4444; border-radius: 50%;
    box-shadow: 0 0 10px #ef4444;
  }
  .scanner-illus.vc .laser-fan {
    position: absolute;
    left: 50%; top: 24%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-top: 90px solid rgba(239, 68, 68, .25);
    filter: blur(2px);
    animation: fan 2.4s ease-in-out infinite;
  }
  @keyframes fan {
    0%, 100% { opacity: .25; transform: translateX(-50%) scaleX(.9); }
    50% { opacity: .55; transform: translateX(-50%) scaleX(1.05); }
  }
  .scanner-illus.vc .pkg {
    position: absolute; bottom: 12%; left: 50%;
    transform: translateX(-50%);
    width: 56%; height: 36%;
    background: linear-gradient(180deg, #d4a574, #a87a48);
    border-radius: 3px;
    box-shadow: 0 8px 16px rgba(0,0,0,.5), inset 0 -6px 8px rgba(0,0,0,.25), inset 0 4px 6px rgba(255,255,255,.15);
  }
  .scanner-illus.vc .pkg::after {
    content: ""; position: absolute;
    left: 16%; right: 16%; top: 50%; transform: translateY(-50%);
    height: 26%;
    background: repeating-linear-gradient(90deg, #111 0 2px, transparent 2px 5px, #111 5px 7px, transparent 7px 11px);
    border-radius: 1px;
  }
  .scanner-illus.vc .scan-line {
    position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
    width: 56%; height: 2px;
    background: linear-gradient(90deg, transparent, #ef4444, transparent);
    box-shadow: 0 0 12px rgba(239,68,68,.8);
    animation: sweep 2.4s ease-in-out infinite;
  }
  @keyframes sweep {
    0%, 100% { transform: translate(-50%, 0); opacity: .3; }
    50% { transform: translate(-50%, -160%); opacity: 1; }
  }

  .scan-right { display: flex; flex-direction: column; gap: 12px; }
  .scan-headline {
    display: flex; align-items: center; gap: 14px;
    color: var(--ink); font-weight: 700; font-size: 18px;
    letter-spacing: -0.01em;
  }
  .scan-headline .pulse {
    width: 10px; height: 10px; border-radius: 50%; background: var(--success);
    box-shadow: 0 0 0 0 rgba(23,201,100,.5);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(23,201,100,.5); }
    100% { box-shadow: 0 0 0 14px rgba(23,201,100,0); }
  }
  .scan-sub { color: var(--ink-2); font-size: 14px; margin-top: -4px; }
  .scan-input-wrap {
    display: flex; gap: 10px; align-items: center;
  }
  .scan-input {
    flex: 1;
    height: 56px;
    border-radius: 14px;
    border: 1.5px solid var(--line);
    background: var(--line-2);
    padding: 0 18px;
    font-size: 16px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .scan-input::placeholder { color: var(--ink-3); letter-spacing: 0; font-family: 'Inter', sans-serif; }
  .scan-input:focus {
    border-color: var(--brand);
    background: white;
    box-shadow: 0 0 0 4px rgba(0,111,238,.12);
  }
  .scan-stats {
    display: flex; gap: 10px;
  }
  .stat-chip {
    background: var(--line-2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--ink-2);
  }
  .stat-chip .n { font-weight: 700; color: var(--success); font-size: 16px; }
  .stat-chip.warn .n { color: var(--warn); }

  /* ===== Empty state ===== */
  .empty {
    margin-top: 28px;
    background: var(--panel);
    border: 1px dashed var(--line);
    border-radius: var(--r-lg);
    padding: 56px 28px;
    text-align: center;
    color: var(--ink-3);
  }
  .empty h3 { color: var(--ink); margin: 14px 0 6px; font-size: 18px; }
  .empty .codes {
    display: inline-flex; gap: 8px; margin-top: 18px; flex-wrap: wrap;
    justify-content: center;
  }
  .empty .codes button {
    border: 1px solid var(--line);
    background: white;
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all .15s ease;
  }
  .empty .codes button:hover {
    border-color: var(--brand);
    color: var(--brand);
    background: var(--brand-50);
  }
  .empty-illus {
    width: 64px; height: 64px; border-radius: 16px;
    background: var(--line-2);
    margin: 0 auto;
    display: grid; place-items: center;
    color: var(--ink-3);
  }

  /* ===== Order layout ===== */
  .order {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .info-grid > .panel { padding: 18px; min-height: 100%; }
  @media (max-width: 1280px) {
    .info-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .info-grid { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow);
  }
  .panel-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
  }
  .panel-head h2 {
    margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  }
  .panel-head .spacer { flex: 1; }

  /* Order header */
  .order-head {
    padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .items { border-top: 1px solid var(--line); }
  .order-head.collapsible {
    cursor: pointer;
    user-select: none;
    transition: background .15s ease, border-color .15s ease;
  }
  .order-head.collapsible:hover { background: var(--line-2); }
  .chev-toggle {
    display: inline-grid; place-items: center;
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--line-2);
    color: var(--ink-2);
    margin-right: 14px;
    flex: 0 0 32px;
    transition: transform .2s ease, background .2s ease;
  }
  .order-head.collapsible:hover .chev-toggle { background: white; }
  .chev-toggle.open { transform: rotate(180deg); }
  .order-head-row {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .order-code {
    display: flex; align-items: center; gap: 0;
  }
  .order-code .pid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .order-code .pid-prefix { color: var(--ink-3); }
  .order-code .meta {
    color: var(--ink-2); font-size: 13px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--line-2);
    color: var(--ink-2);
  }
  .badge.ok { background: var(--success-50); color: #0c8242; }
  .badge.warn { background: var(--warn-50); color: #a36500; }
  .badge.cold { background: var(--cold-50); color: #0369a1; }
  .badge.brand { background: var(--brand-50); color: var(--brand); }

  /* Progress */
  .progress {
    background: var(--line-2);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px 16px;
    align-items: center;
  }
  .progress-label {
    color: var(--ink-2); font-size: 13px;
  }
  .progress-label b { color: var(--ink); font-weight: 700; }
  .progress-track {
    grid-column: 1 / -1;
    height: 8px; border-radius: 999px;
    background: white; overflow: hidden;
    border: 1px solid var(--line);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #17c964, #06b251);
    border-radius: 999px;
    transition: width .35s ease;
  }
  .progress-count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--ink);
  }
  .progress-count .total { color: var(--ink-3); font-weight: 500; }

  /* Items */
  .items {
    padding: 8px 0 16px;
  }
  .item {
    display: grid;
    grid-template-columns: 72px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid var(--line-2);
    transition: background .15s ease;
  }
  .item:last-child { border-bottom: 0; }
  .item.done { background: linear-gradient(90deg, rgba(23,201,100,.06), transparent 60%); }
  .item-photo {
    width: 72px; height: 72px;
    border-radius: 12px;
    background: var(--line-2);
    overflow: hidden;
    position: relative;
    display: grid; place-items: center;
    color: var(--ink-3);
    font-size: 22px;
  }
  .item-photo .ph {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,.04) 0 6px, transparent 6px 12px),
      linear-gradient(135deg, #eef2f5, #e3e8ec);
  }
  .item-photo .label {
    position: relative;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-3);
  }
  .item-meta { display: flex; flex-direction: column; gap: 4px; }
  .item-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .item-sku { font-family: 'JetBrains Mono', monospace; color: var(--ink-3); font-size: 12px; }
  .item-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--line-2);
    color: var(--ink-2);
    font-weight: 500;
  }
  .tag.cold { background: var(--cold-50); color: #0369a1; }
  .tag.frag { background: var(--warn-50); color: #a36500; }

  .qty {
    display: flex; align-items: center; gap: 8px;
    background: var(--line-2);
    padding: 8px 12px;
    border-radius: 10px;
  }
  .qty .picked {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 18px; color: var(--success);
  }
  .qty.pending .picked { color: var(--ink-3); }
  .qty .sep { color: var(--ink-3); }
  .qty .total {
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-2); font-weight: 600; font-size: 18px;
  }
  .check {
    min-width: 40px; height: 40px; padding: 0 12px; border-radius: 12px;
    background: var(--line-2); display: grid; place-items: center;
    color: var(--ink);
    font-weight: 700;
    transition: background .2s ease, color .2s ease;
  }
  .item.done .check { background: var(--success); color: white; }

  /* Right column */
  .side { display: flex; flex-direction: column; gap: 16px; }
  .side .panel { padding: 18px; }
  .panel-title {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 12px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .panel-title .ic {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--line-2);
    display: grid; place-items: center; color: var(--ink-2);
  }

  /* GIF card */
  .gif {
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    background:
      radial-gradient(80% 60% at 50% 30%, rgba(0,111,238,.10), transparent 70%),
      linear-gradient(180deg, #0f172a, #1e293b);
    position: relative;
    overflow: hidden;
    display: grid; place-items: center;
  }
  .gif .ph-label {
    position: absolute;
    top: 10px; left: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,.55);
    letter-spacing: .18em;
  }
  .gif .ph-dot {
    position: absolute; top: 12px; right: 12px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #fca5a5;
    letter-spacing: .18em;
  }
  .gif .ph-dot::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,.6);
    animation: pulse-red 1.4s ease-out infinite;
  }
  @keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
    100% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }
  .gif-art { position: relative; width: 75%; height: 70%; }
  .box-fold {
    position: absolute; inset: 18% 12% 14% 12%;
    border-radius: 4px;
    background: linear-gradient(180deg, #d4a574, #b8895a);
    box-shadow:
      inset 0 -10px 14px rgba(0,0,0,.18),
      inset 0 10px 14px rgba(255,255,255,.18),
      0 18px 28px rgba(0,0,0,.35);
    transform: perspective(420px) rotateX(34deg);
  }
  .box-fold::before, .box-fold::after {
    content: "";
    position: absolute;
    background: linear-gradient(180deg, #c89a6a, #a87a48);
    border-radius: 2px;
    box-shadow: inset 0 4px 6px rgba(0,0,0,.15);
  }
  .box-fold::before {
    left: 0; right: 0; top: -38%; height: 50%;
    transform-origin: bottom center;
    transform: rotateX(-110deg);
    animation: fold 3.2s ease-in-out infinite;
  }
  .box-fold::after {
    left: 0; right: 0; bottom: -38%; height: 50%;
    transform-origin: top center;
    transform: rotateX(110deg);
    animation: fold 3.2s ease-in-out infinite .4s;
  }
  @keyframes fold {
    0%, 100% { transform: rotateX(-110deg); }
    40%, 60% { transform: rotateX(-8deg); }
  }
  /* Label sticking animation */
  .label-art { position: relative; width: 75%; height: 70%; }
  .label-box {
    position: absolute; inset: 22% 16% 18% 16%;
    border-radius: 4px;
    background: linear-gradient(180deg, #d4a574, #b8895a);
    box-shadow:
      inset 0 -10px 14px rgba(0,0,0,.18),
      inset 0 10px 14px rgba(255,255,255,.18),
      0 14px 26px rgba(0,0,0,.35);
    transform: perspective(420px) rotateX(28deg);
  }
  .label-box::after {
    content: ""; position: absolute;
    left: 0; right: 0; top: 50%; transform: translateY(-50%);
    height: 14%;
    background: repeating-linear-gradient(90deg, #f1e1c8 0 4px, #d4b88d 4px 6px);
    opacity: .35;
  }
  .label-sticker {
    position: absolute;
    left: 30%; width: 40%;
    top: 18%;
    aspect-ratio: 4 / 3;
    background: white;
    border-radius: 4px;
    box-shadow: 0 8px 18px rgba(0,0,0,.25);
    transform: perspective(420px) rotateX(28deg) translateY(0);
    animation: stick 3s ease-in-out infinite;
    display: flex; flex-direction: column;
    padding: 8px;
    gap: 4px;
  }
  .label-sticker span {
    display: block;
    background: #1f2937;
    border-radius: 1px;
  }
  .label-sticker span:nth-child(1) { width: 70%; height: 4px; }
  .label-sticker span:nth-child(2) {
    width: 100%; height: 28%;
    background: repeating-linear-gradient(90deg, #111 0 2px, transparent 2px 4px, #111 4px 5px, transparent 5px 8px);
  }
  .label-sticker span:nth-child(3) { width: 40%; height: 3px; }
  @keyframes stick {
    0% { transform: perspective(420px) rotateX(28deg) translateY(-80%) translateX(60%) rotateZ(8deg); opacity: 0; }
    35% { transform: perspective(420px) rotateX(28deg) translateY(-10%) translateX(10%) rotateZ(2deg); opacity: 1; }
    55%, 90% { transform: perspective(420px) rotateX(28deg) translateY(0) translateX(0) rotateZ(0); opacity: 1; }
    100% { transform: perspective(420px) rotateX(28deg) translateY(0) translateX(0) rotateZ(0); opacity: 1; }
  }
  .gif-step-bar {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    display: flex; gap: 6px;
  }
  .gif-step-bar div {
    flex: 1; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,.18);
  }
  .gif-step-bar div.active { background: white; }
  .gif-caption {
    margin-top: 12px;
    font-size: 13px; color: var(--ink-2);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .gif-caption b { color: var(--ink); font-weight: 600; }
  .gif-caption .steps { color: var(--ink-3); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* Info cards */
  .info-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .info-row:last-child { border-bottom: 0; }
  .info-row .ic2 {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: grid; place-items: center;
  }
  .info-row .ic2.b { background: var(--brand-50); color: var(--brand); }
  .info-row .ic2.g { background: var(--success-50); color: #0c8242; }
  .info-row .ic2.c { background: var(--cold-50); color: #0369a1; }
  .info-row .ic2.w { background: var(--warn-50); color: #a36500; }
  .info-row .lab { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
  .info-row .val { color: var(--ink); font-weight: 600; font-size: 14px; margin-top: 1px; }
  .info-row .sub { color: var(--ink-2); font-size: 12px; }

  /* Temperature dial */
  .temp-card {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 16px;
    align-items: center;
  }
  .dial {
    width: 92px; height: 92px;
    border-radius: 50%;
    background:
      conic-gradient(from 220deg, #0ea5e9 0%, #38bdf8 20%, #fbbf24 60%, #ef4444 100%);
    display: grid; place-items: center;
    position: relative;
  }
  .dial::after {
    content: "";
    position: absolute; inset: 8px;
    background: white;
    border-radius: 50%;
  }
  .dial .needle {
    position: absolute;
    width: 3px; height: 38px;
    background: var(--ink);
    top: 8px; left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(var(--rot, -60deg));
    border-radius: 2px;
    z-index: 2;
  }
  .dial .center {
    position: absolute; width: 12px; height: 12px;
    border-radius: 50%; background: var(--ink);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 3;
  }
  .temp-num {
    display: flex; flex-direction: column;
  }
  .temp-num .deg {
    font-size: 32px; font-weight: 700; color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .temp-num .deg .unit { font-size: 18px; color: var(--ink-3); }
  .temp-num .where { color: var(--ink-2); font-size: 13px; margin-top: 6px; }
  .temp-num .where b { color: var(--ink); font-weight: 600; }
  .temp-num .forecast {
    color: var(--ink-3); font-size: 12px; margin-top: 2px;
  }

  /* Carrier card */
  .carrier {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 12px;
    align-items: center;
  }
  .carrier-logo {
    width: 56px; height: 56px; border-radius: 12px;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: white;
    font-weight: 800; font-size: 22px;
    display: grid; place-items: center;
    box-shadow: 0 6px 14px rgba(29,78,216,.3);
    letter-spacing: -0.02em;
  }
  .carrier-info .name { font-weight: 700; font-size: 16px; color: var(--ink); }
  .carrier-info .svc { font-size: 13px; color: var(--ink-2); margin-top: 2px; }
  .carrier-info .eta {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--ink-3); margin-top: 4px;
  }
  .carrier-info .eta b { color: var(--ink); font-weight: 600; }

  /* Box card */
  .box-card { display: grid; grid-template-columns: 88px 1fr; gap: 14px; align-items: center; }
  .box-3d {
    width: 88px; height: 88px; position: relative;
    display: grid; place-items: center;
  }
  .box-3d svg { width: 100%; height: 100%; }
  .box-info .name { font-weight: 700; font-size: 16px; }
  .box-info .dim {
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-2); font-size: 13px; margin-top: 2px;
  }
  .box-info .fill {
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-3);
  }
  .fill-bar {
    flex: 1; height: 6px; border-radius: 999px;
    background: var(--line-2); overflow: hidden;
  }
  .fill-bar > div {
    height: 100%; background: var(--brand);
    border-radius: 999px;
  }

  /* Action bar */
  .actions {
    margin-top: 16px;
    padding: 18px 22px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    display: flex; gap: 12px; align-items: center;
    box-shadow: var(--shadow);
  }
  .actions .info {
    flex: 1; display: flex; gap: 16px; align-items: center;
  }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 6px;
    background: var(--line-2);
    color: var(--ink-2);
  }
  .actions .hint { color: var(--ink-3); font-size: 13px; }
  .btn-big {
    height: 44px; padding: 0 22px;
    border-radius: 12px;
    background: var(--success);
    color: white; font-weight: 700; font-size: 14px;
    border: 0; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 6px 16px rgba(23,201,100,.3);
    transition: background .15s ease, transform .08s ease;
  }
  .btn-big:disabled {
    background: var(--line);
    color: var(--ink-3);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-big:not(:disabled):hover { background: #14b85a; }
  .btn-big:active { transform: translateY(1px); }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: #0f172a;
    color: white;
    border-radius: 12px;
    padding: 12px 18px;
    display: flex; align-items: center; gap: 10px;
    font-size: 14px;
    box-shadow: 0 14px 32px rgba(2,6,23,.4);
    animation: rise .25s ease-out;
  }
  .toast.success { background: #06723a; }
  .toast.warn { background: #92400e; }
  .toast.error { background: #9f1239; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Compact mode */
  body.compact .item { padding: 10px 22px; }
  body.compact .item-photo { width: 56px; height: 56px; }
  body.compact .order-code .pid { font-size: 22px; }

  @media (max-width: 1180px) {
    .topbar .crumbs { display: none; }
  }
  @media (max-width: 1100px) {
    .scan-card { grid-template-columns: 1fr; }
    .scanner-illus { height: 120px; }
  }
  @media (max-width: 900px) {
    .topbar { padding: 0 16px; gap: 10px; }
    .topbar .station { display: none; }
    .stage { padding: 16px 16px 48px; }
    .scan-headline { font-size: 15px; }
    .order-head { padding: 18px; }
    .order-code .pid { font-size: 22px; }
    .item { padding: 12px 16px; grid-template-columns: 56px 1fr auto; gap: 12px; }
    .item-photo { width: 56px; height: 56px; }
    .actions { flex-wrap: wrap; gap: 10px; }
    .actions .info { order: 3; width: 100%; flex-wrap: wrap; }
    .btn-big { flex: 1; justify-content: center; }
  }
  @media (max-width: 640px) {
    .topbar .brand span { display: none; }
    .scan-stats { flex-direction: column; gap: 6px; }
    .stat-chip { width: 100%; }
    .order-head-row { gap: 10px; }
    .order-code { flex-wrap: wrap; }
    .panel-head { padding: 14px 16px; }
    .panel-title { font-size: 11px; }
    .gif { aspect-ratio: 4 / 3; }
    .actions .kbd, .actions .hint .kbd { display: inline-block; }
    .actions .hint { font-size: 12px; }
    .btn.ghost { padding: 9px 10px; }
    .scan-card { padding: 14px; gap: 14px; }
    .item-name { font-size: 14px; }
    .empty { padding: 36px 16px; }
  }
  @media (max-width: 420px) {
    .topbar .btn.ghost span:not(.kbd) { display: none; }
    .order-code .pid { font-size: 20px; }
    .check { min-width: 44px; }
  }
</style>
</head>
