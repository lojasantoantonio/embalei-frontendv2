<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Embalei · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f6f7;
    --panel: #ffffff;
    --ink: #11181c;
    --ink-2: #51565d;
    --ink-3: #889096;
    --line: #e6e7eb;
    --line-2: #eef0f3;
    --brand: #006fee;
    --brand-50: #e6f1fe;
    --success: #17c964;
    --danger: #f31260;
    --shadow: 0 1px 2px rgba(17,24,28,.04), 0 6px 20px rgba(17,24,28,.06);
    --shadow-lg: 0 24px 60px rgba(17,24,28,.12);
    --r: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* ===== Page ===== */
  .page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 520px;
  }

  /* Left: brand/visual side */
  .visual {
    position: relative;
    background:
      radial-gradient(140% 90% at 0% 0%, rgba(0,111,238,.10), transparent 55%),
      radial-gradient(120% 80% at 100% 100%, rgba(120,40,200,.10), transparent 55%),
      linear-gradient(180deg, #0b1220 0%, #111827 60%, #0b1220 100%);
    color: white;
    padding: 48px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .visual-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(80% 70% at 30% 40%, black, transparent 80%);
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 800; letter-spacing: -0.02em; font-size: 22px;
    z-index: 1;
  }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, #0a5cd1, #006fee 60%, #38bdf8);
    display: grid; place-items: center; color: white; font-weight: 800;
    box-shadow: 0 8px 18px rgba(0,111,238,.45);
  }

  .visual-body {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    gap: 28px;
    z-index: 1;
    max-width: 460px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 12px;
    color: rgba(255,255,255,.55);
  }
  h1 {
    margin: 0;
    font-size: 44px; line-height: 1.05;
    letter-spacing: -0.025em;
    font-weight: 700;
  }
  h1 .accent {
    background: linear-gradient(90deg, #38bdf8, #a5f3fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .lede {
    color: rgba(255,255,255,.7);
    font-size: 16px; line-height: 1.55;
  }

  /* Mini scanner illustration */
  .mini-scanner {
    position: relative;
    width: 100%;
    aspect-ratio: 2.2 / 1;
    border-radius: var(--r-lg);
    background:
      radial-gradient(120% 80% at 20% 0%, rgba(255,255,255,.08), transparent 60%),
      linear-gradient(180deg, #1f242b 0%, #0d1015 100%);
    border: 1px solid rgba(255,255,255,.06);
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0,0,0,.4);
  }
  .mini-scanner .label {
    position: absolute; top: 14px; left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(255,255,255,.45);
  }
  .mini-scanner .led {
    position: absolute; top: 14px; right: 16px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: #86efac;
  }
  .mini-scanner .led::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 12px #22c55e;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .mini-scanner .window {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 64%; height: 56%;
    border-radius: 10px;
    background: radial-gradient(60% 80% at 50% 50%, #ff2a2a 0%, #780000 70%, #2a0000 100%);
    box-shadow: inset 0 0 30px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.04);
    overflow: hidden;
  }
  .mini-scanner .window::before {
    content: "";
    position: absolute; left: 0; right: 0; top: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,200,200,.85), transparent);
    box-shadow: 0 0 14px rgba(255,80,80,.7);
    animation: scan 2.4s ease-in-out infinite;
  }
  @keyframes scan {
    0%, 100% { transform: translateY(-30px); opacity: .3; }
    50% { transform: translateY(30px); opacity: 1; }
  }

  .visual-footer {
    display: flex; gap: 24px;
    color: rgba(255,255,255,.55);
    font-size: 13px;
    z-index: 1;
  }
  .visual-footer b { color: white; font-weight: 600; }

  /* Right: form side */
  .form-side {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 56px;
    position: relative;
  }
  .form-card {
    width: 100%; max-width: 380px;
  }
  .form-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .form-sub {
    color: var(--ink-2); font-size: 14px;
    margin: 0 0 28px;
  }

  .field {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 16px;
  }
  .field label {
    font-size: 12px; font-weight: 600;
    color: var(--ink-2);
  }
  .field .ctrl {
    position: relative;
  }
  .field .ic-left {
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }
  .field input,
  .field select {
    width: 100%;
    height: 48px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: white;
    padding: 0 14px 0 42px;
    font-size: 14px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
    appearance: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus,
  .field select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 4px rgba(0,111,238,.12);
  }
  .field input::placeholder { color: var(--ink-3); }
  .field select { cursor: pointer; }
  .field select:invalid { color: var(--ink-3); }
  .field .chev {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3); pointer-events: none;
  }
  .field .help {
    margin-top: 4px;
    font-size: 12px; color: var(--ink-3);
  }
  .field .error {
    color: var(--danger);
    font-size: 12px;
    margin-top: 4px;
    display: none;
  }
  .field.invalid input,
  .field.invalid select {
    border-color: var(--danger);
    box-shadow: 0 0 0 4px rgba(243,18,96,.12);
  }
  .field.invalid .error { display: block; }

  .station-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .station-card {
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    background: white;
    text-align: left;
    transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: inherit;
  }
  .station-card:hover { border-color: var(--ink-3); }
  .station-card.selected {
    border-color: var(--brand);
    background: var(--brand-50);
    box-shadow: 0 0 0 4px rgba(0,111,238,.10);
  }
  .station-card .num {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--line-2);
    display: grid; place-items: center;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink-2);
  }
  .station-card.selected .num {
    background: var(--brand); color: white;
  }
  .station-card .info { display: flex; flex-direction: column; line-height: 1.2; }
  .station-card .name { font-weight: 600; font-size: 13px; }
  .station-card .sub {
    font-size: 11px; color: var(--ink-3);
    margin-top: 1px;
  }
  .station-card.busy { opacity: .55; cursor: not-allowed; }
  .station-card.busy:hover { border-color: var(--line); }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    margin-left: auto;
    background: var(--success);
    box-shadow: 0 0 0 3px rgba(23,201,100,.18);
  }
  .station-card.busy .dot {
    background: var(--ink-3);
    box-shadow: 0 0 0 3px rgba(136,144,150,.18);
  }

  .submit {
    width: 100%;
    height: 50px;
    border-radius: 12px;
    border: 0;
    background: var(--ink);
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-family: inherit;
    transition: background .15s ease, transform .08s ease;
  }
  .submit:hover { background: #000; }
  .submit:active { transform: translateY(1px); }
  .submit:disabled {
    background: var(--line);
    color: var(--ink-3);
    cursor: not-allowed;
  }
  .submit .spin {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .small {
    margin-top: 18px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
    color: var(--ink-3);
  }
  .small a {
    color: var(--brand); text-decoration: none; font-weight: 600;
  }
  .small a:hover { text-decoration: underline; }

  .build {
    position: absolute;
    bottom: 24px; left: 56px; right: 56px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    display: flex; justify-content: space-between;
    letter-spacing: 0.05em;
  }

  @media (max-width: 980px) {
    .page { grid-template-columns: 1fr; }
    .visual { padding: 32px; min-height: 280px; }
    .visual-body { max-width: none; gap: 18px; }
    h1 { font-size: 32px; }
    .mini-scanner { display: none; }
    .form-side { padding: 32px; align-items: flex-start; padding-top: 40px; }
    .build { position: static; padding: 16px 0 0; }
  }
  @media (max-width: 560px) {
    .visual { padding: 24px; min-height: 220px; }
    h1 { font-size: 26px; }
    .lede { font-size: 14px; }
    .visual-footer { gap: 12px; font-size: 12px; flex-wrap: wrap; }
    .form-side { padding: 24px; }
    .form-title { font-size: 22px; }
    .form-sub { font-size: 13px; margin-bottom: 22px; }
    .field input, .field select { height: 46px; }
    .station-card { padding: 10px 12px; gap: 8px; }
    .station-card .num { width: 28px; height: 28px; font-size: 13px; }
    .station-card .name { font-size: 12px; }
    .station-card .sub { font-size: 10px; }
    .submit { height: 48px; font-size: 14px; }
    .small { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
  @media (max-width: 380px) {
    .station-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useMemo } = React;

const USERS = [
  { id: "lara",     name: "Lara Mendes",        role: "Embaladora · turno tarde" },
  { id: "renan",    name: "Renan Oliveira",     role: "Embalador · turno manhã" },
  { id: "carol",    name: "Carolina Sato",      role: "Supervisora de logística" },
  { id: "diego",    name: "Diego Albuquerque",  role: "Embalador · turno noite" },
  { id: "patricia", name: "Patrícia Reis",      role: "Conferência" },
  { id: "tiago",    name: "Tiago Vasconcelos",  role: "Embalador · turno tarde" },
];

const STATIONS = [
  { id: 1, name: "Estação 01", sub: "Padrão",        busy: false },
  { id: 2, name: "Estação 02", sub: "Padrão",        busy: false },
  { id: 3, name: "Estação 03", sub: "Refrigerados",  busy: false },
  { id: 4, name: "Estação 04", sub: "Refrigerados",  busy: true  },
  { id: 5, name: "Estação 05", sub: "Frágeis",       busy: false },
  { id: 6, name: "Estação 06", sub: "Expresso",      busy: true  },
];

const Ic = {
  user:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  cake:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 21H4v-7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7Z"/><path d="M4 16s1.5-2 4-2 3.5 2 4 2 1.5-2 4-2 4 2 4 2"/><path d="M2 21h20"/><path d="M7 8v3"/><path d="M12 8v3"/><path d="M17 8v3"/><path d="M7 4l.01 2"/><path d="M12 4l.01 2"/><path d="M17 4l.01 2"/></svg>,
  chev:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>,
  arrow: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
};

function StationCard({ s, selected, onClick }) {
  return (
    <button
      type="button"
      className={"station-card" + (selected ? " selected" : "") + (s.busy ? " busy" : "")}
      onClick={() => !s.busy && onClick(s.id)}
      disabled={s.busy}
    >
      <span className="num">{String(s.id).padStart(2, "0")}</span>
      <span className="info">
        <span className="name">{s.name}</span>
        <span className="sub">{s.sub}</span>
      </span>
      <span className="dot" title={s.busy ? "ocupada" : "disponível"}></span>
    </button>
  );
}

function App() {
  const [user, setUser] = useState("");
  const [dob, setDob] = useState("");
  const [station, setStation] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);

  const errors = useMemo(() => ({
    user: !user,
    dob: !dob,
    station: station == null,
  }), [user, dob, station]);

  const onSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    if (errors.user || errors.dob || errors.station) return;
    setLoading(true);
    setTimeout(() => {
      window.location.href = "Embalagem.html";
    }, 700);
  };

  const showErr = (k) => submitted && errors[k];

  return (
    <div className="page">
      <aside className="visual">
        <div className="visual-grid"></div>
        <div className="brand">
          <div className="brand-mark">E</div>
          <span>Embalei</span>
        </div>
        <div className="visual-body">
          <span className="eyebrow">Estação de embalagem</span>
          <h1>Bipa, embala<br/>e <span className="accent">manda ver.</span></h1>
          <p className="lede">
            Identifique-se para abrir uma estação. Cada pedido bipado puxa
            itens, caixa recomendada, transportadora e temperatura no destino.
          </p>
          <div className="mini-scanner">
            <span className="label">SYM · LS2208</span>
            <span className="led">ONLINE</span>
            <div className="window"></div>
          </div>
        </div>
        <div className="visual-footer">
          <span><b>v3.4.1</b> · build 8210</span>
          <span><b>CD Curitiba</b> · 6 estações ativas</span>
        </div>
      </aside>

      <main className="form-side">
        <form className="form-card" onSubmit={onSubmit} noValidate>
          <h2 className="form-title">Entrar na estação</h2>
          <p className="form-sub">Selecione seu usuário, confirme sua data de nascimento e escolha em qual estação você vai embalar hoje.</p>

          <div className={"field" + (showErr("user") ? " invalid" : "")}>
            <label htmlFor="user">Usuário</label>
            <div className="ctrl">
              <span className="ic-left"><Ic.user width="16" height="16" /></span>
              <select
                id="user"
                value={user}
                onChange={(e) => setUser(e.target.value)}
                required
              >
                <option value="" disabled>Selecione seu nome</option>
                {USERS.map(u => (
                  <option key={u.id} value={u.id}>{u.name} — {u.role}</option>
                ))}
              </select>
              <span className="chev"><Ic.chev width="16" height="16" /></span>
            </div>
            <div className="error">Selecione um usuário.</div>
          </div>

          <div className={"field" + (showErr("dob") ? " invalid" : "")}>
            <label htmlFor="dob">Data de nascimento</label>
            <div className="ctrl">
              <span className="ic-left"><Ic.cake width="16" height="16" /></span>
              <input
                id="dob"
                type="date"
                value={dob}
                onChange={(e) => setDob(e.target.value)}
                max="2010-12-31"
                min="1940-01-01"
                required
              />
            </div>
            <div className="help">Confirmação de identidade.</div>
            <div className="error">Informe sua data de nascimento.</div>
          </div>

          <div className={"field" + (showErr("station") ? " invalid" : "")}>
            <label>Estação</label>
            <div className="station-grid">
              {STATIONS.map(s => (
                <StationCard
                  key={s.id}
                  s={s}
                  selected={station === s.id}
                  onClick={setStation}
                />
              ))}
            </div>
            <div className="help">
              Estações em cinza estão ocupadas por outros operadores.
            </div>
            <div className="error">Escolha uma estação disponível.</div>
          </div>

          <button type="submit" className="submit" disabled={loading}>
            {loading ? (
              <>
                <span className="spin"></span>
                Abrindo estação…
              </>
            ) : (
              <>
                Entrar
                <Ic.arrow width="16" height="16" />
              </>
            )}
          </button>

          <div className="small">
            <span>Não consegue entrar? Fale com o supervisor.</span>
            <a href="#help">Ajuda</a>
          </div>
        </form>
        <div className="build">
          <span>EMBALEI · STATION OS</span>
          <span>v3.4.1 · 2026</span>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
